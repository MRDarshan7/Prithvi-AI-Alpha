services:
  backend:
    build: ./backend
    container_name: prithvi-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: prithvi-frontend
    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      - backend
